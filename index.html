<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hackathon Judging</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-hi: #1f242d;
    --border: #262b35;
    --text: #e6e8ec;
    --muted: #8b93a3;
    --accent: #6ea8fe;
    --strong: #34c759;
    --moderate: #f0a020;
    --weak: #d05050;
    --missing: #d05050;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .stats { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  header input[type=search] {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 6px; width: 220px; font: inherit;
  }
  header button {
    background: var(--accent); color: #0b0c10; border: 0;
    padding: 6px 12px; border-radius: 6px; font: inherit; font-weight: 600; cursor: pointer;
  }
  header button.secondary { background: var(--panel-hi); color: var(--text); border: 1px solid var(--border); }

  nav.tracks {
    display: flex; gap: 4px; padding: 8px 20px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  nav.tracks button {
    background: transparent; color: var(--muted); border: 1px solid transparent;
    padding: 6px 12px; border-radius: 6px; font: inherit; cursor: pointer; white-space: nowrap;
  }
  nav.tracks button.active { background: var(--panel-hi); color: var(--text); border-color: var(--border); }
  nav.tracks button .count { color: var(--muted); margin-left: 6px; font-size: 12px; }
  nav.tracks button.active .count { color: var(--accent); }

  main { padding: 16px 20px 80px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-weight: 600; font-size: 12px; color: var(--muted);
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    user-select: none; cursor: pointer; white-space: nowrap;
  }
  thead th.sortable:hover { color: var(--text); }
  thead th .arrow { color: var(--accent); margin-left: 4px; }
  tbody tr.row { border-bottom: 1px solid var(--border); }
  tbody tr.row:hover { background: var(--panel); }
  tbody tr.row.expanded { background: var(--panel); }
  tbody td { padding: 10px; vertical-align: top; }
  td.proj { font-weight: 600; cursor: pointer; }
  td.proj .theme { display: block; font-weight: 400; color: var(--muted); font-size: 12px; margin-top: 2px; }

  .chip { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .chip.strong { background: rgba(52,199,89,0.15); color: var(--strong); }
  .chip.moderate { background: rgba(240,160,32,0.15); color: var(--moderate); }
  .chip.weak { background: rgba(208,80,80,0.15); color: var(--weak); }
  .chip.missing { background: rgba(208,80,80,0.18); color: var(--missing); }
  .chip.empty { background: var(--panel-hi); color: var(--muted); }

  .links a {
    display: inline-block; margin-right: 6px; padding: 3px 8px;
    background: var(--panel-hi); color: var(--accent); text-decoration: none;
    border-radius: 4px; font-size: 12px; border: 1px solid var(--border);
  }
  .links a:hover { background: var(--bg); }
  .links span.disabled { display: inline-block; margin-right: 6px; padding: 3px 8px; color: #444; font-size: 12px; }

  td.score { white-space: nowrap; }
  td.score .score-display { font-variant-numeric: tabular-nums; font-weight: 600; }
  td.score .score-display.unset { color: var(--muted); font-weight: 400; }

  tr.detail { display: none; }
  tr.detail.show { display: table-row; }
  tr.detail td { padding: 0 10px 16px; background: var(--panel); }
  .primary-links-row { display: flex; gap: 8px; padding: 12px 0 0; flex-wrap: wrap; }
  a.primary-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; background: var(--panel-hi); color: var(--text); text-decoration: none; font-weight: 600; border: 1px solid var(--border); font-size: 13px; }
  a.primary-link:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
  a.primary-link.demo { background: var(--accent); color: #0b0c10; border-color: var(--accent); }
  a.primary-link.demo:hover { background: #8fbcff; color: #0b0c10; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 12px 0; }
  .detail-grid h3 { font-size: 12px; color: var(--muted); margin: 0 0 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .detail-grid .box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; white-space: pre-wrap; font-size: 13px; max-height: 400px; overflow-y: auto; }
  .detail-grid .box.missing-box { border-color: var(--missing); }

  .scoring { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-top: 12px; }
  .scoring h3 { font-size: 12px; color: var(--muted); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .score-row label { width: 240px; font-size: 13px; color: var(--muted); cursor: help; }
  .score-row label .weight { color: var(--accent); font-variant-numeric: tabular-nums; font-size: 11px; margin-left: 4px; }
  .score-row input[type=range] { flex: 1; max-width: 240px; }
  .score-row .val { width: 24px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .score-row .clear { background: transparent; color: var(--muted); border: 0; cursor: pointer; font-size: 12px; }
  .score-row textarea {
    flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 8px; font: inherit; min-height: 60px; resize: vertical;
  }
  .empty-state { color: var(--muted); padding: 40px; text-align: center; }
</style>
</head>

const FIT_RANK = { strong: 3, moderate: 2, weak: 1, "": 0 };
const SCORE_DIMS = [
  ["originality", "Originality & Track Fit", 20, "Fresh, clearly defined idea within its track. Meaningfully distinct, with a clear point of view."],
  ["execution",   "Technical Execution & Initia Integration", 30, "Appchain deployed (local or testnet). Core logic implemented well. Initia-native functionality used meaningfully."],
  ["product",     "Product Value & UX", 20, "Understandable, functional, and improved by the Initia experience."],
  ["demo",        "Working Demo & Completeness", 20, "Runs end-to-end. Demo and README are sufficient for judges to verify quickly."],
  ["market",      "Market Understanding", 10, "Target user clearly defined. Credible go-to-market and awareness of the competitive landscape."],
];
const STORAGE_KEY = "hackathonScores.v2";

let state = {
  track: "All",
  sort: { col: "name", dir: 1 },
  search: "",
  expanded: new Set(),
  scores: loadScores(),
};

function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveScores() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.scores));
}
function getScore(name) { return state.scores[name] || {}; }
function setScore(name, key, val) {
  state.scores[name] = state.scores[name] || {};
  if (val === null || val === undefined || val === "") delete state.scores[name][key];
  else state.scores[name][key] = val;
  if (Object.keys(state.scores[name]).length === 0) delete state.scores[name];
  saveScores();
}
function avgScore(name) {
  const s = getScore(name);
  let weighted = 0, totalWeight = 0;
  for (const [k, , w] of SCORE_DIMS) {
    if (typeof s[k] === "number") {
      weighted += s[k] * w;
      totalWeight += w;
    }
  }
  if (!totalWeight) return null;
  return weighted / totalWeight;
}
function isFullyScored(name) {
  const s = getScore(name);
  return SCORE_DIMS.every(([k]) => typeof s[k] === "number");
}

function trackCounts() {
  const counts = { All: PROJECTS.length };
  for (const p of PROJECTS) counts[p.track] = (counts[p.track] || 0) + 1;
  return counts;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function renderTracks() {
  const counts = trackCounts();
  const order = ["All", "AI", "Gaming", "DeFi", "Infra/Security", "Consumer/Marketplace"];
  const tracks = order.filter(t => counts[t]).concat(
    Object.keys(counts).filter(t => !order.includes(t))
  );
  const nav = document.getElementById("trackNav");
  nav.innerHTML = tracks.map(t =>
    `<button data-track="${escapeHtml(t)}" class="${t===state.track?'active':''}">${escapeHtml(t)}<span class="count">${counts[t]}</span></button>`
  ).join("");
  nav.querySelectorAll("button").forEach(b => b.onclick = () => {
    state.track = b.dataset.track;
    renderTracks(); renderTable();
  });
}

function visibleProjects() {
  const q = state.search.toLowerCase().trim();
  return PROJECTS
    .filter(p => state.track === "All" || p.track === state.track)
    .filter(p => !q || (p.name+" "+p.theme+" "+p.summary+" "+p.notes).toLowerCase().includes(q));
}

function sortProjects(list) {
  const { col, dir } = state.sort;
  const cmp = (a,b) => {
    let av, bv;
    if (col === "fit") { av = FIT_RANK[a.fit]; bv = FIT_RANK[b.fit]; }
    else if (col === "missing") { av = a.missing ? 1 : 0; bv = b.missing ? 1 : 0; }
    else if (col === "score") { av = avgScore(a.name) ?? -1; bv = avgScore(b.name) ?? -1; }
    else if (col === "track") { av = a.track; bv = b.track; }
    else { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    if (av < bv) return -1*dir;
    if (av > bv) return 1*dir;
    return a.name.toLowerCase().localeCompare(b.name.toLowerCase());
  };
  return [...list].sort(cmp);
}

function renderTable() {
  const list = sortProjects(visibleProjects());
  document.getElementById("stats").textContent =
    `${list.length} project${list.length===1?'':'s'} · ${Object.keys(state.scores).length} scored`;

  const arrow = c => state.sort.col === c ? `<span class="arrow">${state.sort.dir>0?'↑':'↓'}</span>` : '';
  const headers = [
    ["name", "Project"],
    ["track", "Track"],
    ["fit", "Appchain Fit"],
    ["missing", "Missing"],
    ["links", "Links"],
    ["score", "Weighted Score"],
  ];

  let html = `<table><thead><tr>` +
    headers.map(([c,l]) =>
      c==="links" ? `<th>${l}</th>` : `<th class="sortable" data-col="${c}">${l}${arrow(c)}</th>`
    ).join("") + `</tr></thead><tbody>`;

  if (!list.length) {
    html += `<tr><td colspan="6" class="empty-state">No matching projects.</td></tr>`;
  }
  for (const p of list) {
    const expanded = state.expanded.has(p.name);
    const fitChip = p.fit
      ? `<span class="chip ${p.fit}">${p.fit}</span>`
      : `<span class="chip empty">—</span>`;
    const missChip = p.missing
      ? `<span class="chip missing" title="${escapeHtml(p.missing)}">flagged</span>`
      : `<span class="chip empty">—</span>`;
    const links = [
      p.github && `<a href="${escapeHtml(p.github)}" target="_blank" rel="noopener">GitHub</a>`,
      p.app && `<a href="${escapeHtml(p.app)}" target="_blank" rel="noopener">App</a>`,
      p.demo && `<a href="${escapeHtml(p.demo)}" target="_blank" rel="noopener">Demo</a>`,
    ].filter(Boolean).join("") || `<span class="disabled">—</span>`;
    const avg = avgScore(p.name);
    const scoreCell = avg !== null
      ? `<span class="score-display">${avg.toFixed(2)}</span>`
      : `<span class="score-display unset">—</span>`;

    html += `<tr class="row ${expanded?'expanded':''}" data-name="${escapeHtml(p.name)}">
      <td class="proj">${escapeHtml(p.name)}${p.theme?`<span class="theme">${escapeHtml(p.theme)}</span>`:""}</td>
      <td>${escapeHtml(p.track)}</td>
      <td>${fitChip}</td>
      <td>${missChip}</td>
      <td class="links">${links}</td>
      <td class="score">${scoreCell}</td>
    </tr>`;

    if (expanded) {
      const s = getScore(p.name);
      const sliders = SCORE_DIMS.map(([k,label,weight,desc]) => {
        const v = s[k] ?? "";
        return `<div class="score-row">
          <label title="${escapeHtml(desc)}">${escapeHtml(label)} <span class="weight">${weight}%</span></label>
          <input type="range" min="1" max="5" step="1" data-score="${k}" value="${v||3}" ${v===""?'data-unset="1"':''}>
          <span class="val">${v||"—"}</span>
          ${v!==""?`<button class="clear" data-clear="${k}">clear</button>`:""}
        </div>`;
      }).join("");
      const note = s.note || "";
      const primaryLinks = [
        p.demo   && `<a class="primary-link demo" href="${escapeHtml(p.demo)}" target="_blank" rel="noopener">▶ Watch Demo</a>`,
        p.app    && `<a class="primary-link" href="${escapeHtml(p.app)}" target="_blank" rel="noopener">↗ Open App</a>`,
        p.github && `<a class="primary-link" href="${escapeHtml(p.github)}" target="_blank" rel="noopener">⌥ GitHub</a>`,
      ].filter(Boolean).join("");
      html += `<tr class="detail show" data-name="${escapeHtml(p.name)}"><td colspan="6">
        <div class="primary-links-row">${primaryLinks || '<span style="color:var(--muted)">No links provided</span>'}</div>
        <div class="detail-grid">
          <div>
            <h3>Hacker Summary</h3>
            <div class="box">${escapeHtml(p.summary || "(none)")}</div>
          </div>
          <div>
            <h3>Evaluation Notes</h3>
            <div class="box">${escapeHtml(p.notes || "(none)")}</div>
            ${p.missing ? `<h3 style="margin-top:12px;color:var(--missing)">Missing Requirements</h3><div class="box missing-box">${escapeHtml(p.missing)}</div>` : ""}
          </div>
        </div>
        <div class="scoring">
          <h3>Your Scores (1–5)</h3>
          ${sliders}
          <div class="score-row" style="align-items:flex-start">
            <label>Comment</label>
            <textarea data-score="note" placeholder="Optional notes…">${escapeHtml(note)}</textarea>
          </div>
        </div>
      </td></tr>`;
    }
  }
  html += `</tbody></table>`;
  document.getElementById("main").innerHTML = html;

  document.querySelectorAll("th.sortable").forEach(th => th.onclick = () => {
    const c = th.dataset.col;
    if (state.sort.col === c) state.sort.dir *= -1;
    else { state.sort.col = c; state.sort.dir = (c==="name"||c==="track") ? 1 : -1; }
    renderTable();
  });
  document.querySelectorAll("tr.row").forEach(tr => tr.onclick = e => {
    if (e.target.tagName === "A") return;
    const n = tr.dataset.name;
    if (state.expanded.has(n)) state.expanded.delete(n); else state.expanded.add(n);
    renderTable();
  });
  document.querySelectorAll("tr.detail").forEach(tr => {
    const name = tr.dataset.name;
    tr.addEventListener("click", e => e.stopPropagation());
    tr.querySelectorAll('input[type=range]').forEach(inp => {
      inp.oninput = () => {
        inp.nextElementSibling.textContent = inp.value;
      };
      inp.onchange = () => {
        setScore(name, inp.dataset.score, parseInt(inp.value, 10));
        renderTable();
      };
    });
    tr.querySelectorAll('button.clear').forEach(b => b.onclick = () => {
      setScore(name, b.dataset.clear, null);
      renderTable();
    });
    const ta = tr.querySelector('textarea[data-score=note]');
    if (ta) ta.onchange = () => {
      setScore(name, "note", ta.value.trim() || null);
    };
  });
}

document.getElementById("search").oninput = e => {
  state.search = e.target.value;
  renderTable();
};
document.getElementById("clearScores").onclick = () => {
  if (!confirm("Clear ALL scores from this browser? This cannot be undone.")) return;
  state.scores = {};
  saveScores();
  renderTable();
};
document.getElementById("exportBtn").onclick = () => {
  const header = ["Project","Track","Appchain Fit","Missing"]
    .concat(SCORE_DIMS.map(([,label,w]) => `${label} (${w}%)`))
    .concat(["Weighted Avg","Fully Scored","Comment","GitHub","App","Demo"]);
  const rows = [header];
  for (const p of PROJECTS) {
    const s = getScore(p.name);
    const avg = avgScore(p.name);
    rows.push([
      p.name, p.track, p.fit, p.missing ? "yes" : "",
      ...SCORE_DIMS.map(([k]) => s[k] ?? ""),
      avg !== null ? avg.toFixed(2) : "",
      isFullyScored(p.name) ? "yes" : "",
      s.note || "",
      p.github, p.app, p.demo
    ]);
  }
  const csv = rows.map(r => r.map(c => {
    const s = String(c ?? "");
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `hackathon-scores-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
};

renderTracks();
renderTable();
</script>
</body>
</html>
